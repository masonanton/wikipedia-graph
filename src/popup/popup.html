<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wikipedia Graph</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #0f1117;
        font-family: system-ui, sans-serif;
        color: #e2e8f0;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #f1f5f9;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #334155;
      }
      .dot.active { background: #22c55e; }
      .dot.inactive { background: #334155; }

      .stats {
        font-size: 11px;
        color: #64748b;
      }
      .stats strong {
        color: #94a3b8;
        font-variant-numeric: tabular-nums;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      button {
        background: none;
        border: 1px solid #1e2130;
        border-radius: 5px;
        color: #64748b;
        font-size: 11px;
        font-family: inherit;
        padding: 4px 8px;
        cursor: pointer;
        transition: all 0.1s;
      }
      button:hover:not(:disabled) {
        background: #1e2130;
        color: #94a3b8;
      }
      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      #graph-container {
        flex: 1;
        overflow: hidden;
      }

      #graph-container svg {
        width: 100%;
        height: 100%;
      }

      .labels text {
        fill: #e2e8f0;
        font-family: system-ui, sans-serif;
        pointer-events: none;
        text-shadow: 0 1px 3px #0f1117, 0 0 6px #0f1117;
      }

      .nodes circle { cursor: grab; }
      .nodes circle:active { cursor: grabbing; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <div class="dot" id="wiki-dot"></div>
        <span class="title">Wikipedia Graph</span>
        <span class="stats"><strong id="node-count">0</strong> nodes</span>
      </div>
      <div class="header-right">
        <button id="open-tab" disabled>Open in tab</button>
        <button id="clear-data" disabled>Clear</button>
      </div>
    </header>
    <div id="graph-container"></div>
    <script src="popup.js"></script>
    <script src="graph.js"></script>
  </body>
</html>
